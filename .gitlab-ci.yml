stages:
  - deploy

variables:
  PNPM_STORE_PATH: ".pnpm-store"

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

before_script:
  - asdf install
  - CI=true pnpm install --frozen-lockfile --store-dir $PNPM_STORE_PATH

deploy_staging:
  stage: deploy
  script:
    - pnpm build:staging
    - pnpm deploy:staging --APP_OSS_ACCESS_KEY_ID="${OSS_ACCESS_KEY_ID}" --APP_OSS_ACCESS_KEY_SECRET="${OSS_ACCESS_KEY_SECRET}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
