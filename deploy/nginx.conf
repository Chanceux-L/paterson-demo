# aida_website_template Nginx site template.
# Nuxt/Nitro handles route behavior and cache headers from nuxt.config.ts.
# Nginx only terminates HTTP(S) and proxies traffic to the PM2/Nitro process.

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' '';
}

upstream enterprise_standard_template_v3 {
  server 127.0.0.1:8010;
  keepalive 32;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name aida-website-template.preview.aida.yun;

  ssl_certificate /opt/lego/certificates/_.preview.aida.yun.crt;
  ssl_certificate_key /opt/lego/certificates/_.preview.aida.yun.key;

  client_max_body_size 20m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/xml
    image/svg+xml;

  access_log /var/log/nginx/aida-website-template.access.log;
  error_log /var/log/nginx/aida-website-template.error.log;

  location / {
    proxy_pass http://enterprise_standard_template_v3;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 60s;
  }
}

